<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>Pencarian Rute Pintar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
      body {
        background: radial-gradient(circle, #00b4b4 0%, #006666 100%);
        margin: 0;
        padding: 20px 16px;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
        overflow-x: hidden;
        position: relative;
      }

      #tsparticles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
      }

      .main-container {
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2;
      }

      .judul-kotak {
        background-color: #009999;
        padding: 8px 20px;
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        text-transform: lowercase;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        margin-bottom: 40px;
        margin-top: 10px;
        border-radius: 8px;
        letter-spacing: 1px;
      }

      .search-box {
        display: flex;
        width: 100%;
        height: 46px;
        margin-bottom: 25px;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      
      .search-box:focus-within {
        transform: scale(1.02);
        box-shadow: 0 6px 20px rgba(0,180,180,0.4);
      }

      .input-rute {
        flex: 1;
        border: none;
        padding: 0 20px;
        font-size: 15px;
        color: #333;
        background-color: #ffffff;
        outline: none;
      }

      .tombol-cari {
        background: linear-gradient(135deg, #3b66de 0%, #254bba 100%);
        color: #ffffff;
        border: none;
        padding: 0 22px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.1s ease;
      }

      .tombol-cari:active {
        transform: scale(0.95);
      }

      .label-hasil {
        color: #ffffff;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 12px;
        text-transform: lowercase;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      }

      .box-hasil {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        box-sizing: border-box;
        padding: 20px;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }

      .list-rute-item {
        background: rgba(255, 255, 255, 0.9);
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 12px;
        list-style: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        color: #222;
        animation: fadeInUp 0.5s ease forwards;
      }

      .tag-minggu {
        display: inline-block;
        font-size: 11px;
        background-color: #008080;
        color: #fff;
        padding: 2px 6px;
        border-radius: 4px;
        margin-top: 4px;
        font-weight: 600;
      }

      .text-center {
        text-align: center;
        margin: 0;
        color: #fff;
        font-weight: 500;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        margin: 20px auto 10px auto;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <div id="tsparticles"></div>

    <div class="main-container">
      <div class="judul-kotak animate__animated animate__jackInTheBox">pencarian rute</div>

      <div class="search-box animate__animated animate__fadeInUp">
        <input type="text" id="cariInput" class="input-rute" placeholder="Contoh: senin mggu 1 / senin 24" />
        <button id="tombolCari" class="tombol-cari">cari</button>
      </div>

      <div class="label-hasil animate__animated animate__fadeIn">hasil</div>

      <div id="loadingRute" class="box-hasil animate__animated animate__fadeInUp">
        <p class="text-center" style="opacity: 0.7;">Hasil pencarian pintar kamu bakal muncul di sini...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        tsParticles.load("tsparticles", {
          particles: {
            number: { value: 40, density: { enable: true, value_area: 800 } },
            color: { value: "#ffffff" },
            opacity: { value: 0.3 },
            size: { value: 3 },
            line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, out_mode: "out" }
          }
        });

        // FUNGSI PENERJEMAH MINGGU & FORMAT TAMPILAN
        function formatHariKeren(hariRaw) {
            let namaHari = hariRaw.replace(/[0-9]/g, '').trim();
            if (hariRaw.includes('13')) {
                return `Hari ${namaHari.toUpperCase()} <br><span class="tag-minggu">Minggu 1 & 3</span>`;
            } else if (hariRaw.includes('24')) {
                return `Hari ${namaHari.toUpperCase()} <br><span class="tag-minggu">Minggu 2 & 4</span>`;
            }
            return `Hari ${hariRaw.toUpperCase()}`;
        }

        const tombol = document.getElementById('tombolCari');
        const inputKetik = document.getElementById('cariInput');
        const infoLoading = document.getElementById('loadingRute'); 
        const urlData = "https://script.google.com/macros/s/AKfycbySCVi4KqgVxD8F4Cei3vH54PQyYH-jBH2oKllFwKjm03gwUfiA-curiR_Mpz62xhNU/exec";

        if (tombol && inputKetik && infoLoading) {
            tombol.addEventListener('click', (e) => {
                e.preventDefault(); 

                let kataKunci = inputKetik.value.toLowerCase().trim();

                if (kataKunci === "") {
                    alert("masukkan hari/rute untuk di cari");
                    return;
                }
                
                infoLoading.innerHTML = `
                  <div class="spinner"></div>
                  <p class='text-center'>Sedang mencari rute terbaik...</p>
                `;
                
                fetch(urlData, { method: "GET", redirect: "follow" })
                    .then(response => response.json())
                    .then(data => {
                        const hasilFilter = data.filter(item => {
                            let hariData = item.hari.toLowerCase();
                            let ruteData = item.rute.toLowerCase();

                            // JIKA TEMPAT KETIK ADA KATA 'MINGGU' ATAU 'MGGU'
                            if (kataKunci.includes("minggu") || kataKunci.includes("mggu") || kataKunci.includes("mgu")) {
                                let hariSaja = kataKunci.replace(/(minggu|mggu|mgu|\s)/g, '').replace(/[0-9]/g, '');
                                let angkaMinggu = kataKunci.match(/[1-4]/); 
                                
                                if (angkaMinggu) {
                                    let digit = angkaMinggu[0];
                                    // COCOKKAN LOGIKA APALAKAH INPUT 1 ATAU 3 COCOK DENGAN DATA '13'
                                    if ((digit === "1" || digit === "3") && hariData.includes(hariSaja) && hariData.includes("13")) return true;
                                    if ((digit === "2" || digit === "4") && hariData.includes(hariSaja) && hariData.includes("24")) return true;
                                }
                            }

                            // JIKA USER KETIK FORMAT SINGKAT MISAL: 'senin 1', 'senin 3'
                            let formatSingkat = kataKunci.match(/^([a-z]+)\s*([1-4])$/);
                            if (formatSingkat) {
                                let hariSaja = formatSingkat[1];
                                let digit = formatSingkat[2];
                                if ((digit === "1" || digit === "3") && hariData.includes(hariSaja) && hariData.includes("13")) return true;
                                if ((digit === "2" || digit === "4") && hariData.includes(hariSaja) && hariData.includes("24")) return true;
                            }

                            // PENCARIAN STANDAR (Biar kalau ketik 'senin' atau nama rute tetep jalan)
                            return hariData.includes(kataKunci) || ruteData.includes(kataKunci);
                        });

                        if (hasilFilter.length > 0) {
                            let html = "<ul style='margin:0; padding:0;'>";
                            hasilFilter.forEach((item, index) => {
                                html += `<li class="list-rute-item" style="animation-delay: ${index * 0.1}s">
                                          ${formatHariKeren(item.hari)}: <span style="font-weight:500;">${item.rute}</span>
                                         </li>`;
                            });
                            html += "</ul>";
                            infoLoading.innerHTML = html;
                            
                            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
                        } else {
                            infoLoading.innerHTML = "<p class='text-center' style='color:#ffbcbc; font-weight: bold;'>ga ketemu, seng genah inputnya</p>";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        infoLoading.innerHTML = "<p class='text-center' style='color:#ffbcbc;'>Gagal memuat data.</p>";
                    });
            });
        }
    });
    </script>
  </body>
</html>

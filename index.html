        <div class="w-form">
          <form id="email-form" name="email-form" style="display: block; width: 100%; box-sizing: border-box;">
            
            <!-- KOLOM INPUT SPESIAL HP -->
            <input class="text-field w-input" maxlength="256" name="cari-rute" placeholder="Contoh: Senin atau Tanjung Bumi" type="text" id="cariInput" style="width: 100%; height: 48px; box-sizing: border-box; padding: 0 16px; border: 1.5px solid #cbd5e1; border-radius: 10px; font-size: 16px; margin-bottom: 12px; background-color: #f8fafc; display: block; -webkit-appearance: none; outline: none;" />
            
            <!-- TOMBOL CARI EMPUK DAN LEBAR -->
            <a id="tombolCari" href="#" class="button w-button" style="width: 100%; height: 48px; line-height: 48px; box-sizing: border-box; text-align: center; background-color: #0284c7; color: #ffffff; padding: 0; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 16px; display: block; box-shadow: 0 2px 4px rgba(2, 132, 199, 0.2);">Cari Rute</a>

          <div id="loadingRute" style="margin-top: 16px; width: 100%; box-sizing: border-box; text-align: left;"></div>

    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=6a3b627457e5acdf2771169e" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.prod.website-files.com/6a3b627457e5acdf2771169e/js/webflow.a0aa6ca1.b7683852b8a60d8e.js" type="text/javascript" integrity="sha384-BrZ5RLWViy0IN9p2miOlvxmv2gP1sT/YqoMSDJznd6k1tb7t0mPZus3psGWfkx5f" crossorigin="anonymous"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const tombol = document.getElementById('tombolCari');
        const inputKetik = document.getElementById('cariInput');
        const infoLoading = document.getElementById('loadingRute'); 
        const urlData = "https://script.google.com/macros/s/AKfycbySCVi4KqgVxD8F4Cei3vH54PQyYH-jBH2oKllFwKjm03gwUfiA-curiR_Mpz62xhNU/exec";

        if (tombol && inputKetik && infoLoading) {
            tombol.addEventListener('click', (e) => {
                e.preventDefault(); 

                const kataKunci = inputKetik.value.toLowerCase().trim();

                if (kataKunci === "") {
                    alert("Ketik nama rute atau hari dulu, Fer!");
                    return;
                }
                
                infoLoading.style.background = "#ffffff";
                infoLoading.style.border = "1.5px dashed #cbd5e1";
                infoLoading.style.borderRadius = "10px";
                infoLoading.style.padding = "14px";
                infoLoading.innerHTML = "<p style='margin:0; color:#64748b; text-align:center; font-size:14px;'>Sedang mencari rute...</p>";
                
                fetch(urlData, { method: "GET", redirect: "follow" })
                    .then(response => response.json())
                    .then(data => {
                        const hasilFilter = data.filter(item => {
                            return item.hari.toLowerCase().includes(kataKunci) || 
                                   item.rute.toLowerCase().includes(kataKunci);
                        });

                        if (hasilFilter.length > 0) {
                            infoLoading.style.border = "1.5px solid #e2e8f0";
                            infoLoading.style.background = "#f8fafc";
                            
                            let html = "<ul style='margin:0; padding-left:20px; color:#334155; line-height: 1.6; font-size:15px;'>";
                            hasilFilter.forEach(item => {
                                html += `<li style='margin-bottom:8px;'>Hari <strong>${item.hari}</strong>: ${item.rute}</li>`;
                            });
                            html += "</ul>";
                            infoLoading.innerHTML = html;
                        } else {
                            infoLoading.style.border = "1.5px solid #fecaca";
                            infoLoading.style.background = "#fef2f2";
                            infoLoading.innerHTML = "<p style='margin:0; color:#dc2626; text-align:center; font-size:14px;'>Rute gak ketemu, Fer. Coba cek lagi.</p>";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        infoLoading.style.border = "1.5px solid #fecaca";
                        infoLoading.style.background = "#fef2f2";
                        infoLoading.innerHTML = "<p style='margin:0; color:#dc2626; text-align:center; font-size:14px;'>Gagal memuat data.</p>";
                    });
            });
        }
    });
    </script>

<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <title>Pencarian Rute</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
      body {
        background: radial-gradient(circle, #00b4b4 0%, #006666 100%);
        margin: 0;
        padding: 20px 16px;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
        overflow-x: hidden;
        position: relative;
      }

      /* CONTAINER BACKGROUND PARTIKEL */
      #tsparticles {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: 1;
        pointer-events: none;
      }

      .main-container {
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2; /* Biar di depan partikel */
      }

      /* JUDUL DENGAN ANIMASI TERGULING/MASUK */
      .judul-kotak {
        background-color: #009999;
        padding: 8px 20px;
        color: #ffffff;
        font-size: 22px;
        font-weight: 800;
        text-transform: lowercase;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        margin-bottom: 40px;
        margin-top: 10px;
        border-radius: 8px;
        letter-spacing: 1px;
      }

      /* KOTAK SEARCH DENGAN EFEK TRANSISI HALUS */
      .search-box {
        display: flex;
        width: 100%;
        height: 46px;
        margin-bottom: 25px;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }
      
      .search-box:focus-within {
        transform: scale(1.02);
        box-shadow: 0 6px 20px rgba(0,180,180,0.4);
      }

      .input-rute {
        flex: 1;
        border: none;
        padding: 0 20px;
        font-size: 15px;
        color: #333;
        background-color: #ffffff;
        outline: none;
      }

      /* TOMBOL DENGAN EFEK HOVER DAN KLIK */
      .tombol-cari {
        background: linear-gradient(135deg, #3b66de 0%, #254bba 100%);
        color: #ffffff;
        border: none;
        padding: 0 22px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.1s ease;
      }

      .tombol-cari:active {
        transform: scale(0.95);
      }

      .label-hasil {
        color: #ffffff;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 12px;
        text-transform: lowercase;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      }

      /* BOX HASIL SEKARANG GLASSMORPHISM TRANSPARAN BIAR MODERN */
      .box-hasil {
        width: 100%;
        aspect-ratio: 1 / 1;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        box-sizing: border-box;
        padding: 20px;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        transition: all 0.4s ease;
      }

      /* ANIMASI LIST BIAR MUNCUL SATU PER SATU */
      .list-rute-item {
        background: rgba(255, 255, 255, 0.9);
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 12px;
        list-style: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        color: #222;
        animation: fadeInUp 0.5s ease forwards;
      }

      .text-center {
        text-align: center;
        margin: 0;
        color: #fff;
        font-weight: 500;
      }

      /* ANIMASI ROTASI LOADING SPREAD */
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: #fff;
        margin: 20px auto 10px auto;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>

    <div id="tsparticles"></div>

    <div class="main-container">
      <div class="judul-kotak animate__animated animate__jackInTheBox">pencarian rute</div>

      <div class="search-box animate__animated animate__fadeInUp">
        <input type="text" id="cariInput" class="input-rute" placeholder="cari rute/hari disini" />
        <button id="tombolCari" class="tombol-cari">cari</button>
      </div>

      <div class="label-hasil animate__animated animate__fadeIn">hasil</div>

      <div id="loadingRute" class="box-hasil animate__animated animate__fadeInUp">
        <p class="text-center" style="opacity: 0.7;">Hasil pencarian kamu bakal muncul di sini...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // KONFIGURASI BACKGROUND PARTIKEL JARING-JARING
        tsParticles.load("tsparticles", {
          particles: {
            number: { value: 40, density: { enable: true, value_area: 800 } },
            color: { value: "#ffffff" },
            opacity: { value: 0.3 },
            size: { value: 3 },
            line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1.5, direction: "none", random: false, straight: false, out_mode: "out" }
          }
        });

        const tombol = document.getElementById('tombolCari');
        const inputKetik = document.getElementById('cariInput');
        const infoLoading = document.getElementById('loadingRute'); 
        const urlData = "https://script.google.com/macros/s/AKfycbySCVi4KqgVxD8F4Cei3vH54PQyYH-jBH2oKllFwKjm03gwUfiA-curiR_Mpz62xhNU/exec";

        if (tombol && inputKetik && infoLoading) {
            tombol.addEventListener('click', (e) => {
                e.preventDefault(); 

                const kataKunci = inputKetik.value.toLowerCase().trim();

                if (kataKunci === "") {
                    alert("masukkan hari/rute untuk di cari");
                    return;
                }
                
                // ANIMASI LOADING SPINNER BARU
                infoLoading.innerHTML = `
                  <div class="spinner"></div>
                  <p class='text-center'>Sedang mencari data rute...</p>
                `;
                
                fetch(urlData, { method: "GET", redirect: "follow" })
                    .then(response => response.json())
                    .then(data => {
                        const hasilFilter = data.filter(item => {
                            return item.hari.toLowerCase().includes(kataKunci) || 
                                   item.rute.toLowerCase().includes(kataKunci);
                        });

                        if (hasilFilter.length > 0) {
                            let html = "<ul style='margin:0; padding:0;'>";
                            hasilFilter.forEach((item, index) => {
                                // Ditambahkan inline style delay biar munculnya gantian estetik
                                html += `<li class="list-rute-item" style="animation-delay: ${index * 0.1}s">
                                          Hari <strong>${item.hari}</strong>: ${item.rute}
                                         </li>`;
                            });
                            html += "</ul>";
                            infoLoading.innerHTML = html;
                            
                            // EFEK CONFETTI BONUS KALAU JAWABAN KETEMU!
                            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });

                        } else {
                            infoLoading.innerHTML = "<p class='text-center' style='color:#ffbcbc; font-weight: bold;'>ga ketemu, seng genah inputnya</p>";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        infoLoading.innerHTML = "<p class='text-center' style='color:#ffbcbc;'>Gagal memuat data.</p>";
                    });
            });
        }
    });
    </script>
  </body>
</html>

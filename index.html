    <!-- OOTAK JAVASCRIPT PENCARIAN RUTE -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const tombol = document.getElementById('tombolCari');
        const inputKetik = document.getElementById('cariInput');
        const tempatHasil = document.querySelector('.w-form'); 
        const urlData = "https://script.google.com/macros/s/AKfycbySCVi4KqgVxD8F4Cei3vH54PQyYH-jBH2oKllFwKjm03gwUfiA-curiR_Mpz62xhNU/exec";

        if (tombol && inputKetik) {
            tombol.addEventListener('click', (e) => {
                e.preventDefault(); 

                const kataKunci = inputKetik.value.toLowerCase().trim();

                if (kataKunci === "") {
                    alert("Ketik nama rute atau hari dulu, Fer!");
                    return;
                }
                
                let infoLoading = document.getElementById('loadingRute');
                if (!infoLoading) {
                    infoLoading = document.createElement('div');
                    infoLoading.id = 'loadingRute';
                    if (tempatHasil) {
                        tempatHasil.appendChild(infoLoading);
                    } else {
                        document.body.appendChild(infoLoading);
                    }
                }
                infoLoading.innerHTML = "<p style='margin-top:15px; color:#666;'>Sedang mencari rute...</p>";
                
                fetch(urlData, { method: "GET", redirect: "follow" })
                    .then(response => response.json())
                    .then(data => {
                        const hasilFilter = data.filter(item => {
                            return item.hari.toLowerCase().includes(kataKunci) || 
                                   item.rute.toLowerCase().includes(kataKunci);
                        });

                        if (hasilFilter.length > 0) {
                            let html = "<ul style='margin-top:15px; padding-left:20px; text-align:left; color:#333;'>";
                            hasilFilter.forEach(item => {
                                html += `<li style='margin-bottom:8px;'><strong>${item.hari}</strong>: ${item.rute}</li>`;
                            });
                            html += "</ul>";
                            infoLoading.innerHTML = html;
                        } else {
                            infoLoading.innerHTML = "<p style='margin-top:15px; color:red;'>Rute gak ketemu, Fer. Coba cek typo-nya.</p>";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        infoLoading.innerHTML = "<p style='margin-top:15px; color:red;'>Gagal memuat data.</p>";
                    });
            });
        }
    });
    </script>

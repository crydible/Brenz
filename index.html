    <!-- INTERAKSI JAVASCRIPT -->
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const tombol = document.getElementById('tombolCari');
        const inputKetik = document.getElementById('cariInput');
        const infoLoading = document.getElementById('loadingRute'); 
        const urlData = "https://script.google.com/macros/s/AKfycbySCVi4KqgVxD8F4Cei3vH54PQyYH-jBH2oKllFwKjm03gwUfiA-curiR_Mpz62xhNU/exec";

        if (tombol && inputKetik && infoLoading) {
            tombol.addEventListener('click', (e) => {
                e.preventDefault(); 

                const kataKunci = inputKetik.value.toLowerCase().trim();

                if (kataKunci === "") {
                    alert("Ketik nama rute atau hari dulu, Fer!");
                    return;
                }
                
                // Set gaya kotak saat loading
                infoLoading.style.background = "#ffffff";
                infoLoading.style.border = "1.5px dashed #cbd5e1";
                infoLoading.style.borderRadius = "10px";
                infoLoading.style.padding = "15px";
                infoLoading.innerHTML = "<p style='margin:0; color:#64748b; text-align:center; font-size:14px;'>Sedang mencari rute...</p>";
                
                fetch(urlData, { method: "GET", redirect: "follow" })
                    .then(response => response.json())
                    .then(data => {
                        const hasilFilter = data.filter(item => {
                            return item.hari.toLowerCase().includes(kataKunci) || 
                                   item.rute.toLowerCase().includes(kataKunci);
                        });

                        if (hasilFilter.length > 0) {
                            infoLoading.style.border = "1.5px solid #e2e8f0";
                            infoLoading.style.background = "#f8fafc";
                            
                            let html = "<ul style='margin:0; padding-left:20px; color:#334155; line-height: 1.6; font-size:15px;'>";
                            hasilFilter.forEach(item => {
                                html += `<li style='margin-bottom:10px;'>Halaman <strong>${item.hari}</strong>: ${item.rute}</li>`;
                            });
                            html += "</ul>";
                            infoLoading.innerHTML = html;
                        } else {
                            infoLoading.style.border = "1.5px solid #fecaca";
                            infoLoading.style.background = "#fef2f2";
                            infoLoading.innerHTML = "<p style='margin:0; color:#dc2626; text-align:center; font-size:14px;'>Rute gak ketemu, Fer. Coba cek typo-nya.</p>";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        infoLoading.style.border = "1.5px solid #fecaca";
                        infoLoading.style.background = "#fef2f2";
                        infoLoading.innerHTML = "<p style='margin:0; color:#dc2626; text-align:center; font-size:14px;'>Gagal memuat data.</p>";
                    });
            });
        }
    });
    </script>
